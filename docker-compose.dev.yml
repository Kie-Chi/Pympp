# Development mode override configuration
# Use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# Or set PYMPP_TYPE=dev and use: ./run_docker.sh

services:
  backend:
    volumes:
      - ./pympp:/app/pympp:ro
      - ./data:/app/data
    environment:
      - PYMPP_TYPE=dev
    command: ["uvicorn", "pympp.api.app:app", "--host", "0.0.0.0", "--port", "28000", "--reload"]

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile.dev
    volumes:
      - ./ui/src:/app/src:ro
      - ./ui/public:/app/public:ro
      - ./ui/index.html:/app/index.html:ro
      - ./ui/vite.config.ts:/app/vite.config.ts:ro
    environment:
      - PYMPP_TYPE=dev
      - VITE_API_BASE_URL=http://backend:28000