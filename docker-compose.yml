services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pympp-backend
    ports:
      - "28000:28000"
    restart: unless-stopped

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: pympp-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
